<script>
(function () {
  "use strict";

  const style = document.createElement("style");
  style.textContent = `
    body.soft-nav-active,
    body.soft-nav-active * {
      cursor: none !important;
    }
  `;
  document.head.appendChild(style);

  const state = {
    active: false,
    inputMode: "mouse",
    root: null,
    buttons: [],
    focused: null,
    virtualX: 0,
    virtualY: 0,
    accumX: 0,
    accumY: 0,
    activating: false,
  };

  function rootElement() {
    return document.body;
  }

  function buttonList(root) {
    return Array.from(root.querySelectorAll("button")).filter((button) => (
      button.offsetParent !== null
      && !button.disabled
      && button.getAttribute("aria-hidden") !== "true"
    ));
  }

  function buttonCenter(button) {
    const rect = button.getBoundingClientRect();
    return {
      x: rect.left + (rect.width / 2),
      y: rect.top + (rect.height / 2),
    };
  }

  function setFocusedButton(button) {
    state.buttons.forEach((candidate) => {
      const active = candidate === button;
      candidate.setAttribute("data-soft-focus", active ? "true" : "false");
    });
    state.focused = button || null;
    if (state.focused) {
      try {
        state.focused.focus({ preventScroll: true });
      } catch (_e) {
        state.focused.focus();
      }
    }
  }

  function nearestButtonFromPoint(x, y) {
    let best = null;
    let bestDistance = Infinity;
    state.buttons.forEach((button) => {
      const center = buttonCenter(button);
      const dx = center.x - x;
      const dy = center.y - y;
      const distance = Math.hypot(dx, dy);
      if (distance < bestDistance) {
        best = button;
        bestDistance = distance;
      }
    });
    return best;
  }

  function currentOrigin() {
    if (state.focused) return buttonCenter(state.focused);
    if (state.root) {
      const rect = state.root.getBoundingClientRect();
      return { x: rect.left + state.virtualX, y: rect.top + state.virtualY };
    }
    return { x: 0, y: 0 };
  }

  function moveFocusByDirection(dx, dy) {
    if (!state.buttons.length) return;
    const origin = currentOrigin();
    const axis = Math.abs(dx) >= Math.abs(dy) ? "x" : "y";
    const directionX = axis === "x" ? Math.sign(dx || 0) : 0;
    const directionY = axis === "y" ? Math.sign(dy || 0) : 0;
    if (!directionX && !directionY) return;

    let best = null;
    let bestScore = Infinity;

    state.buttons.forEach((button) => {
      if (button === state.focused) return;
      const center = buttonCenter(button);
      const offsetX = center.x - origin.x;
      const offsetY = center.y - origin.y;
      const forward = (offsetX * directionX) + (offsetY * directionY);
      if (forward <= 0) return;
      const offAxis = axis === "x" ? Math.abs(offsetY) : Math.abs(offsetX);
      const score = forward + (offAxis * 2.25);
      if (score < bestScore) {
        best = button;
        bestScore = score;
      }
    });

    if (!best) {
      const rect = state.root.getBoundingClientRect();
      best = nearestButtonFromPoint(rect.left + state.virtualX, rect.top + state.virtualY);
    }
    if (best) setFocusedButton(best);
  }

  function activateFocusedButton() {
    if (!state.active || !state.focused || state.focused.disabled) return;
    state.activating = true;
    try {
      state.focused.click();
    } finally {
      window.setTimeout(() => {
        state.activating = false;
      }, 0);
    }
  }

  function releaseSoftNav() {
    if (!state.active) return;
    state.active = false;
    state.accumX = 0;
    state.accumY = 0;
    document.body.classList.remove("soft-nav-active");
    if (state.root) state.root.removeAttribute("data-soft-nav-active");
    setFocusedButton(null);
  }

  function enableMouseMode() {
    state.inputMode = "mouse";
    releaseSoftNav();
  }

  function startSoftNavAtPoint(clientX, clientY) {
    const root = rootElement();
    if (!root) return;
    const rect = root.getBoundingClientRect();
    const inside = clientX >= rect.left && clientX <= rect.right
      && clientY >= rect.top && clientY <= rect.bottom;
    if (!inside) {
      releaseSoftNav();
      return;
    }

    state.root = root;
    state.buttons = buttonList(root);
    if (!state.buttons.length) return;

    state.active = true;
    state.virtualX = clientX - rect.left;
    state.virtualY = clientY - rect.top;
    state.accumX = 0;
    state.accumY = 0;
    document.body.classList.add("soft-nav-active");
    root.setAttribute("data-soft-nav-active", "true");
    setFocusedButton(nearestButtonFromPoint(clientX, clientY));
  }

  function ensureSoftNav() {
    const root = rootElement();
    if (!root) return;
    if (!state.active) {
      const rect = root.getBoundingClientRect();
      const origin = state.focused ? buttonCenter(state.focused) : {
        x: rect.left + (rect.width / 2),
        y: rect.top + (rect.height / 2),
      };
      startSoftNavAtPoint(origin.x, origin.y);
    }
  }

  function handleMouseMove() {
    enableMouseMode();
  }

  function moveVirtualFocus(dx, dy) {
    const root = rootElement();
    if (!root) return;
    ensureSoftNav();
    if (!state.active) return;
    if (root !== state.root) {
      releaseSoftNav();
      ensureSoftNav();
      if (!state.active) return;
    }

    const rect = root.getBoundingClientRect();
    state.virtualX = Math.max(0, Math.min(rect.width, state.virtualX + dx));
    state.virtualY = Math.max(0, Math.min(rect.height, state.virtualY + dy));

    state.accumX += dx;
    state.accumY += dy;
    if (Math.hypot(state.accumX, state.accumY) >= 26) {
      moveFocusByDirection(state.accumX, state.accumY);
      state.accumX = 0;
      state.accumY = 0;
    }
  }

  function installSoftNav() {
    const root = rootElement();
    if (!root) return;
    root.addEventListener("mouseenter", handleMouseMove);
    root.addEventListener("mousemove", handleMouseMove);
    root.addEventListener("mousedown", enableMouseMode, true);
    root.addEventListener("click", () => {
      if (state.activating) return;
      enableMouseMode();
    }, true);
    document.addEventListener("keydown", (event) => {
      if (!state.active) return;
      if (event.key === "Escape") {
        event.preventDefault();
        releaseSoftNav();
        return;
      }
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        activateFocusedButton();
      }
    });
    document.addEventListener("mousemove", handleMouseMove);
    document.addEventListener("mouseleave", releaseSoftNav);
    window.addEventListener("blur", releaseSoftNav);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installSoftNav);
  } else {
    installSoftNav();
  }
})();
</script>

    const lang = docLang.startsWith("en") ? "en" : "zh";
    const dark = document.documentElement.classList.contains("dark");
    return { lang, dark };
  }

  function routeFor(lang, dark) {
    if (lang === "en") return dark ? "/ui/en-dark" : "/ui/en";
    return dark ? "/ui/zh-dark" : "/ui/zh";
  }

  async function persistRoutePreferences(lang, dark) {
    try {
      await fetch("/bindings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ui_language: lang,
          ui_theme: dark ? "dark" : "light",
        }),
      });
    } catch (_error) {
      // Keep navigation working even if preference persistence fails.
    }
  }

  function syncVisibleState() {
    const state = getRouteState();
    const html = document.documentElement;
    const themeIcon = document.getElementById("theme-icon");
    const themeLabel = document.getElementById("theme-label");
    const langSpan = document.querySelector("#lang-toggle span");

    html.classList.toggle("dark", state.dark);
    html.classList.toggle("light", !state.dark);
    html.setAttribute("lang", state.lang === "en" ? "en" : "zh-CN");

    if (themeIcon) themeIcon.innerText = state.dark ? "dark_mode" : "light_mode";
    if (themeLabel) {
      themeLabel.innerText = state.lang === "zh"
        ? (state.dark ? "夜晚" : "白天")
        : (state.dark ? "Night" : "Day");
    }
    if (langSpan) langSpan.innerText = state.lang === "zh" ? "中文 | EN" : "EN | 中文";
  }

  window.toggleTheme = async function () {
    const state = getRouteState();
    await persistRoutePreferences(state.lang, !state.dark);
    window.location.href = routeFor(state.lang, !state.dark);
  };

  window.toggleLanguage = async function () {
    const state = getRouteState();
    const nextLang = state.lang === "zh" ? "en" : "zh";
    await persistRoutePreferences(nextLang, state.dark);
    window.location.href = routeFor(nextLang, state.dark);
  };

  document.addEventListener("DOMContentLoaded", syncVisibleState);
  syncVisibleState();
})();
</script>
<!-- END: controller-mouse-route-page-toggle-fix-v1 -->
